<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Baby Log">
<meta name="theme-color" content="#1a1626">
<title>Baby Log</title>
<style>
  :root {
    --bg: #1a1626;
    --card: #262033;
    --card-press: #322a44;
    --text: #f2edf7;
    --text-dim: #a89bc0;
    --amber: #ffb454;
    --feed: #ff9e6d;
    --diaper: #7fd8a4;
    --sleep: #8fa8ff;
    --wake: #ffd166;
    --danger: #ff7a7a;
    --radius: 22px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: ui-rounded, -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: max(16px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    max-width: 640px;
    margin: 0 auto;
  }

  /* ---- Since-last summary ---- */
  .since {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .since-card {
    flex: 1;
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 12px;
    text-align: center;
  }
  .since-card .label {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  .since-card .value {
    font-size: 26px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .since-card.feed .value { color: var(--feed); }
  .since-card.diaper .value { color: var(--diaper); }
  .since-card.sleep .value { color: var(--sleep); }
  .since-card .value.none { color: var(--text-dim); font-size: 20px; font-weight: 600; }

  /* ---- Sleeping banner ---- */
  .sleeping-banner {
    display: none;
    background: linear-gradient(135deg, #2b3260, #3a2f63);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 18px;
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    color: #c3cfff;
  }
  .sleeping-banner.active { display: block; }

  /* ---- Big buttons ---- */
  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .big-btn {
    border: none;
    border-radius: var(--radius);
    background: var(--card);
    color: var(--text);
    font-family: inherit;
    font-size: 20px;
    font-weight: 800;
    padding: 26px 10px;
    min-height: 110px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.08s ease, background 0.08s ease;
    border-bottom: 5px solid rgba(0,0,0,0.35);
  }
  .big-btn:active { transform: scale(0.96); background: var(--card-press); }
  .big-btn .emoji { font-size: 40px; line-height: 1; }
  .big-btn.feed { box-shadow: inset 0 0 0 2px rgba(255,158,109,0.35); }
  .big-btn.diaper { box-shadow: inset 0 0 0 2px rgba(127,216,164,0.35); }
  .big-btn.sleep { box-shadow: inset 0 0 0 2px rgba(143,168,255,0.35); }
  .big-btn.wake { box-shadow: inset 0 0 0 2px rgba(255,209,102,0.35); }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--amber);
    color: #2b1c00;
    font-weight: 800;
    font-size: 17px;
    padding: 12px 22px;
    border-radius: 999px;
    transition: transform 0.25s ease;
    z-index: 50;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ---- Log ---- */
  h2 {
    font-size: 15px;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .day-header {
    font-size: 14px;
    font-weight: 700;
    color: var(--amber);
    margin: 18px 0 8px;
  }
  .entry {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border-radius: 16px;
    padding: 13px 14px;
    margin-bottom: 8px;
  }
  .entry .icon { font-size: 24px; }
  .entry .info { flex: 1; }
  .entry .type { font-size: 16px; font-weight: 700; }
  .entry .time { font-size: 14px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .entry .delete {
    border: none;
    background: none;
    color: var(--text-dim);
    font-size: 20px;
    font-family: inherit;
    padding: 10px;
    margin: -10px;
    cursor: pointer;
    border-radius: 12px;
  }
  .entry .delete:active { color: var(--danger); background: rgba(255,122,122,0.12); }

  .empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 16px;
    padding: 32px 16px;
    line-height: 1.5;
  }

  .clear-btn {
    display: block;
    margin: 28px auto 0;
    border: none;
    background: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 20px;
    cursor: pointer;
    text-decoration: underline;
    border-radius: 12px;
  }
  .clear-btn:active { color: var(--danger); }

  @media (prefers-reduced-motion: reduce) {
    .big-btn, .toast { transition: none; }
  }
</style>
</head>
<body>

<div class="since">
  <div class="since-card feed">
    <div class="label">Last fed</div>
    <div class="value" id="sinceFeed">—</div>
  </div>
  <div class="since-card diaper">
    <div class="label">Last diaper</div>
    <div class="value" id="sinceDiaper">—</div>
  </div>
  <div class="since-card sleep">
    <div class="label">Last woke</div>
    <div class="value" id="sinceSleep">—</div>
  </div>
</div>

<div class="sleeping-banner" id="sleepingBanner">😴 Baby is sleeping — <span id="sleepDuration"></span></div>

<div class="buttons">
  <button class="big-btn feed" onclick="logEvent('feed')">
    <span class="emoji">🍼</span> Fed
  </button>
  <button class="big-btn diaper" onclick="logEvent('diaper')">
    <span class="emoji">💩</span> Diaper
  </button>
  <button class="big-btn sleep" id="sleepBtn" onclick="logEvent('sleep')">
    <span class="emoji">😴</span> Sleep
  </button>
  <button class="big-btn wake" id="wakeBtn" onclick="logEvent('wake')">
    <span class="emoji">⏰</span> Woke up
  </button>
</div>

<h2>History</h2>
<div id="log"></div>

<button class="clear-btn" onclick="clearAll()">Clear all history</button>

<div class="toast" id="toast">Logged ✓</div>

<script>
const TYPES = {
  feed:   { icon: '🍼', name: 'Fed' },
  diaper: { icon: '💩', name: 'Diaper changed' },
  sleep:  { icon: '😴', name: 'Fell asleep' },
  wake:   { icon: '⏰', name: 'Woke up' }
};

let entries = [];
try {
  entries = JSON.parse(localStorage.getItem('babyLog') || '[]');
} catch (e) { entries = []; }

function save() {
  try {
    localStorage.setItem('babyLog', JSON.stringify(entries));
  } catch (e) {
    showToast('⚠️ Could not save');
  }
}

function logEvent(type) {
  entries.unshift({ id: Date.now() + Math.random(), type: type, ts: Date.now() });
  save();
  render();
  showToast(TYPES[type].icon + ' ' + TYPES[type].name + ' — logged ✓');
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

function clearAll() {
  if (confirm('Delete ALL history? This cannot be undone.')) {
    entries = [];
    save();
    render();
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function fmtDay(ts) {
  const d = new Date(ts);
  const today = new Date(); today.setHours(0,0,0,0);
  const day = new Date(d); day.setHours(0,0,0,0);
  const diff = Math.round((today - day) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
}

function fmtSince(ts) {
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return mins + 'm';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (h < 24) return h + 'h ' + m + 'm';
  return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
}

function lastOf(type) {
  return entries.find(e => e.type === type);
}

function isSleeping() {
  const s = lastOf('sleep');
  const w = lastOf('wake');
  return s && (!w || s.ts > w.ts);
}

function render() {
  // Since-last cards
  const f = lastOf('feed');
  const d = lastOf('diaper');
  const w = lastOf('wake');
  setSince('sinceFeed', f);
  setSince('sinceDiaper', d);
  setSince('sinceSleep', w);

  // Sleeping banner
  const banner = document.getElementById('sleepingBanner');
  if (isSleeping()) {
    banner.classList.add('active');
    document.getElementById('sleepDuration').textContent = fmtSince(lastOf('sleep').ts);
  } else {
    banner.classList.remove('active');
  }

  // Log grouped by day
  const log = document.getElementById('log');
  if (entries.length === 0) {
    log.innerHTML = '<div class="empty">No entries yet.<br>Tap a button above to log the first one.</div>';
    return;
  }
  let html = '';
  let currentDay = '';
  for (const e of entries) {
    const day = fmtDay(e.ts);
    if (day !== currentDay) {
      currentDay = day;
      html += '<div class="day-header">' + day + '</div>';
    }
    const t = TYPES[e.type];
    html += '<div class="entry">'
      + '<span class="icon">' + t.icon + '</span>'
      + '<div class="info"><div class="type">' + t.name + '</div>'
      + '<div class="time">' + fmtTime(e.ts) + '</div></div>'
      + '<button class="delete" onclick="deleteEntry(' + e.id + ')" aria-label="Delete entry">✕</button>'
      + '</div>';
  }
  log.innerHTML = html;
}

function setSince(elId, entry) {
  const el = document.getElementById(elId);
  if (entry) {
    el.textContent = fmtSince(entry.ts) + ' ago';
    el.classList.remove('none');
  } else {
    el.textContent = 'no entries';
    el.classList.add('none');
  }
}

render();
setInterval(render, 30000); // keep "X ago" fresh
</script>
</body>
</html>
